---
layout: default
---
<article style="margin-bottom: 50px;">
  <h1 style="color: #b58900; margin-bottom: 5px;">{{ page.title }}</h1>
  <p style="color: #888; font-style: italic; margin-bottom: 30px;">
    Published on {{ page.date | date: "%B %d, %Y" }}
  </p>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<hr style="border: 0; border-top: 1px solid #444; margin: 40px 0;">

<div style="background: #222; padding: 20px; border-radius: 8px; text-align: center;">
  <h3 style="margin-top: 0;">Frustrated by this? Share the reality.</h3>
  <div style="margin-top: 15px;">
    <a href="https://twitter.com/intent/tweet?text=Read this on Frustrated Citizen: {{ page.title | url_encode }}&url=https://serverrush1770-ship-it.github.io/frustratedcitizen{{ page.url }}" target="_blank" style="display: inline-block; background: #1da1f2; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; margin-right: 15px; font-weight: bold;">
      Share on X
    </a>
    
    <a href="https://api.whatsapp.com/send?text=Check out this article on Frustrated Citizen: https://serverrush1770-ship-it.github.io/frustratedcitizen{{ page.url }}" target="_blank" style="display: inline-block; background: #25d366; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold;">
      Share on WhatsApp
    </a>
  </div>
</div>
